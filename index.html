<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Zen+Dots&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles/styles.css">
    <script defer src="script/script.js"></script>
    <title>Template</title>
    
</head>
<body>
    
    
    <div class="wrapper">
        
        
        
        <section class="gameSection">
            
            <!-- Header -->
            <div class="gameHeader">
                <div class="gameTitle">
                    <span class="titleLetter">M</span>
                    <span class="titleLetter">A</span>
                    <span class="titleLetter">S</span>
                    <span class="titleLetter">T</span>
                    <span class="titleLetter">E</span>
                    <span class="titleLetter">R</span>
                    <span class="titleLetter">M</span>
                    <span class="titleLetter">I</span>
                    <span class="titleLetter">N</span>
                    <span class="titleLetter">D</span>
                </div>
                
                <!-- Stats -->
                <div class="gameStats">
                    <div class="stat statRemainingMoves">Remaining Moves : 10</div>
                    <div class="stat statTimeLeft">Time Left : 20 seconds</div>
                </div>
                
            </div>
            
            
            <!-- Start Btn -->
            
            <div class="startBtn">
                START
            </div>
            
            <!-- The actual game panel -->
            <div class="actualGame">
                
                
                <div class="lastTurnDiv">
                    <div class="lastTurnBox lastTurnBoxOne"></div>
                    <div class="lastTurnBox lastTurnBoxTwo"></div>
                    <div class="lastTurnBox lastTurnBoxThree"></div>
                    <div class="lastTurnBox lastTurnBoxFour"></div>
                </div>
                
                
                <div class="gameLane">
                    
                    
                    <div class="colorBoxSelect">
                        <div class="gameLaneBox gameLaneBoxOne"></div>
                        
                        <div class="colorChoosers">
                            <div class="redColorChooser colorChooser colorChooserOne"></div>
                            <div class="greenColorChooser colorChooser colorChooserOne"></div>
                            <div class="blueColorChooser colorChooser colorChooserOne"></div>
                            <div class="yellowColorChooser colorChooser colorChooserOne"></div>
                        </div>
                        
                    </div>
                    
                    
                    <div class="colorBoxSelect">
                        <div class="gameLaneBox gameLaneBoxTwo"></div>
                        
                        <div class="colorChoosers">
                            <div class="redColorChooser colorChooser colorChooserTwo"></div>
                            <div class="greenColorChooser colorChooser colorChooserTwo"></div>
                            <div class="blueColorChooser colorChooser colorChooserTwo"></div>
                            <div class="yellowColorChooser colorChooser colorChooserTwo"></div>
                        </div>
                    </div>                    
                    
                    
                    <div class="colorBoxSelect">
                        <div class="gameLaneBox gameLaneBoxThree"></div>
                        
                        <div class="colorChoosers">
                            <div class="redColorChooser colorChooser colorChooserThree"></div>
                            <div class="greenColorChooser colorChooser colorChooserThree"></div>
                            <div class="blueColorChooser colorChooser colorChooserThree"></div>
                            <div class="yellowColorChooser colorChooser colorChooserThree"></div>
                        </div>
                    </div>
                    
                    
                    <div class="colorBoxSelect">
                        <div class="gameLaneBox gameLaneBoxFour"></div>
                        
                        <div class="colorChoosers">
                            <div class="redColorChooser colorChooser colorChooserFour"></div>
                            <div class="greenColorChooser colorChooser colorChooserFour"></div>
                            <div class="blueColorChooser colorChooser colorChooserFour"></div>
                            <div class="yellowColorChooser colorChooser colorChooserFour"></div>
                        </div>
                    </div>                    
                    
                </div>
                
                
            </div>
            
            <div class="infoSection">
                <p class="infoContent">
                    Press Start and then choose your color Suite. <br>Try to guess the hidden suite.<br> Be careful, you only have 20 seconds per turn! 
                </p>
            </div>
            
        </section>
        
        
        
        
        
    </div>
    
</body>
</html>
