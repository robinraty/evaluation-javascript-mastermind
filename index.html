<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Zen+Dots&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles/styles.css">
    <script defer src="script/script.js"></script>
    <title>Template</title>
    
</head>
<body>
    
    
    <div class="wrapper">
        
        
        
        <section class="gameSection">
            
            <!-- Header -->
            <div class="gameHeader">
                <div class="gameTitle">
                    <span class="titleLetter">M</span>
                    <span class="titleLetter">A</span>
                    <span class="titleLetter">S</span>
                    <span class="titleLetter">T</span>
                    <span class="titleLetter">E</span>
                    <span class="titleLetter">R</span>
                    <span class="titleLetter">M</span>
                    <span class="titleLetter">I</span>
                    <span class="titleLetter">N</span>
                    <span class="titleLetter">D</span>
                </div>
                
                <!-- Stats -->
                <div class="gameStats">
                    <div class="stat statRemainingMoves">Remaining Moves : 10</div>
                    <div class="stat statTimeLeft">Time Left : 20s</div>
                </div>
                
            </div>
            
            
            
            
            <!-- The actual game panel -->
            <div class="actualGame">
                
                <div class="gameLane">
                    
                    
                    <div class="colorBoxSelect">
                        <div class="gameLaneBox gameLaneBoxOne"></div>
                        
                        <div class="colorChoosers">
                            <div class="redColorChooser colorChooser"></div>
                            <div class="greenColorChooser colorChooser"></div>
                            <div class="blueColorChooser colorChooser"></div>
                            <div class="yellowColorChooser colorChooser"></div>
                        </div>
                        
                    </div>
                    
                    
                    <div class="colorBoxSelect">
                        <div class="gameLaneBox gameLaneBoxOne"></div>
                        
                        <div class="colorChoosers">
                            <div class="redColorChooser colorChooser"></div>
                            <div class="greenColorChooser colorChooser"></div>
                            <div class="blueColorChooser colorChooser"></div>
                            <div class="yellowColorChooser colorChooser"></div>
                        </div>
                    </div>                    
                    
                    
                    <div class="colorBoxSelect">
                        <div class="gameLaneBox gameLaneBoxOne"></div>
                        
                        <div class="colorChoosers">
                            <div class="redColorChooser colorChooser"></div>
                            <div class="greenColorChooser colorChooser"></div>
                            <div class="blueColorChooser colorChooser"></div>
                            <div class="yellowColorChooser colorChooser"></div>
                        </div>
                    </div>
                    
                    
                    <div class="colorBoxSelect">
                        <div class="gameLaneBox gameLaneBoxOne"></div>
                        
                        <div class="colorChoosers">
                            <div class="redColorChooser colorChooser"></div>
                            <div class="greenColorChooser colorChooser"></div>
                            <div class="blueColorChooser colorChooser"></div>
                            <div class="yellowColorChooser colorChooser"></div>
                        </div>
                    </div>                    
                    
                </div>
                
                
            </div>
            
            
            
        </section>
        
        
        
        
        
    </div>
    
</body>
</html>
